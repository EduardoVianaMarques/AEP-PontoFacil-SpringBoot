<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- Fonte Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet">
<body>

<link rel="stylesheet" th:href="@{/menu-lateral.css}">
<!-- NAVBAR PÚBLICA -->

<nav th:fragment="navbar(active)"
     class="navbar navbar-expand-lg navbar-modern shadow-sm">

    <div class="container">

        <a class="navbar-brand logo" th:href="@{/}">
            <i class="bi bi-geo-alt-fill"></i>
            Ponto Fácil
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menuPublico">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="menuPublico">

            <ul class="navbar-nav ms-auto align-items-center">

                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${active == 'inicio'} ? ' active' : ''"
                       th:href="@{/}">
                        Início
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${active == 'como-funciona'} ? ' active' : ''"
                       th:href="@{/como-funciona}">
                        Como Funciona
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${active == 'servicos'} ? ' active' : ''"
                       th:href="@{/servicos}">
                        Serviços
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${active == 'contato'} ? ' active' : ''"
                       th:href="@{/contato}">
                        Contato
                    </a>
                </li>

                <li class="nav-item ms-3">

                    <a class="btn btn-login"
                       th:href="@{/login}">

                        <i class="bi bi-box-arrow-in-right"></i>
                        Login

                    </a>

                </li>

                <li class="nav-item ms-2">

                    <a class="btn btn-register"
                       th:href="@{/cadastro}">

                        <i class="bi bi-person-plus"></i>
                        Cadastro

                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- SIDEBAR DASHBOARD -->

<aside th:fragment="sidebar(active)"
       class="sidebar-modern">

    <div>

        <div class="sidebar-header">

            <div class="logo-circle">
                <i class="bi bi-geo-alt-fill"></i>
            </div>

            <h3>Ponto Fácil</h3>

            <span>Painel do Cidadão</span>

        </div>

        <ul class="sidebar-menu">

            <li>

                <a th:href="@{/}"
                   th:classappend="${active == 'inicio'} ? ' active' : ''">

                    <i class="bi bi-house-door-fill"></i>
                    <span>Início</span>

                </a>

            </li>

            <li>

                <a th:href="@{/perfil}"
                   th:classappend="${active == 'perfil'} ? ' active' : ''">

                    <i class="bi bi-person-fill"></i>
                    <span>Meu Perfil</span>

                </a>

            </li>

            <li>

                <a th:href="@{/nova-solicitacao}"
                   th:classappend="${active == 'nova-solicitacao'} ? ' active' : ''">

                    <i class="bi bi-file-earmark-plus-fill"></i>
                    <span>Nova Solicitação</span>

                </a>

            </li>

            <li>

                <a th:href="@{/acompanhar}"
                   th:classappend="${active == 'acompanhar'} ? ' active' : ''">

                    <i class="bi bi-search"></i>
                    <span>Acompanhar</span>

                </a>

            </li>

        </ul>

    </div>

    <div class="sidebar-footer">

        <a th:href="@{/logout}" class="logout-btn">

            <i class="bi bi-box-arrow-right"></i>
            Sair

        </a>

    </div>

</aside>
</body>
</html>
