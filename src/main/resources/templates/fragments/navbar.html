<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- Fonte Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet">
<body>

<!-- NAVBAR PÚBLICA -->

<nav th:fragment="navbar(active)"
     class="navbar navbar-expand-lg navbar-modern shadow-sm">

    <div class="container">

        <a class="navbar-brand logo" th:href="@{/}">
            <i class="bi bi-geo-alt-fill"></i>
            Ponto Fácil
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menuPublico">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="menuPublico">

            <ul class="navbar-nav ms-auto align-items-center">

                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${active == 'inicio'} ? ' active' : ''"
                       th:href="@{/}">
                        Início
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${active == 'como-funciona'} ? ' active' : ''"
                       th:href="@{/como-funciona}">
                        Como Funciona
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${active == 'servicos'} ? ' active' : ''"
                       th:href="@{/servicos}">
                        Serviços
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${active == 'contato'} ? ' active' : ''"
                       th:href="@{/contato}">
                        Contato
                    </a>
                </li>

                <li class="nav-item ms-3">

                    <a class="btn btn-login"
                       th:href="@{/login}">

                        <i class="bi bi-box-arrow-in-right"></i>
                        Login

                    </a>

                </li>

                <li class="nav-item ms-2">

                    <a class="btn btn-register"
                       th:href="@{/cadastro}">

                        <i class="bi bi-person-plus"></i>
                        Cadastro

                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- SIDEBAR DASHBOARD -->

<aside th:fragment="sidebar(active)"
       class="sidebar-modern">

    <div>

        <div class="sidebar-header">

            <div class="logo-circle">
                <i class="bi bi-geo-alt-fill"></i>
            </div>

            <h3>Ponto Fácil</h3>

            <span>Painel do Cidadão</span>

        </div>

        <ul class="sidebar-menu">

            <li>

                <a th:href="@{/}"
                   th:classappend="${active == 'inicio'} ? ' active' : ''">

                    <i class="bi bi-house-door-fill"></i>
                    <span>Início</span>

                </a>

            </li>

            <li>

                <a th:href="@{/perfil}"
                   th:classappend="${active == 'perfil'} ? ' active' : ''">

                    <i class="bi bi-person-fill"></i>
                    <span>Meu Perfil</span>

                </a>

            </li>

            <li>

                <a th:href="@{/nova-solicitacao}"
                   th:classappend="${active == 'nova-solicitacao'} ? ' active' : ''">

                    <i class="bi bi-file-earmark-plus-fill"></i>
                    <span>Nova Solicitação</span>

                </a>

            </li>

            <li>

                <a th:href="@{/acompanhar}"
                   th:classappend="${active == 'acompanhar'} ? ' active' : ''">

                    <i class="bi bi-search"></i>
                    <span>Acompanhar</span>

                </a>

            </li>

        </ul>

    </div>

    <div class="sidebar-footer">

        <a th:href="@{/logout}" class="logout-btn">

            <i class="bi bi-box-arrow-right"></i>
            Sair

        </a>

    </div>

</aside>

<style>

    :root{
        --primary:#2563eb;
        --primary-light:#dbeafe;
        --bg:#f8fafc;
        --text:#0f172a;
        --text-light:#64748b;
        --border:#e2e8f0;
        --white:#ffffff;
    }

    /* =========================
       NAVBAR
    ========================= */

    .navbar-modern{
        background:white;
        border-bottom:1px solid var(--border);
        padding:14px 0;
    }

    .logo{
        font-size:1.7rem;
        font-weight:700;
        color:var(--text) !important;
    }

    .logo i{
        color:var(--primary);
    }

    .nav-link{
        color:var(--text-light) !important;
        font-weight:500;
        margin:0 6px;
        transition:.3s;
    }

    .nav-link:hover{
        color:var(--primary) !important;
    }

    .nav-link.active{
        color:var(--primary) !important;
        font-weight:600;
    }

    .btn-login{
        border:1px solid var(--border);
        border-radius:12px;
        padding:10px 18px;
        background:white;
        color:var(--text);
        font-weight:600;
    }

    .btn-login:hover{
        background:#f1f5f9;
    }

    .btn-register{
        background:var(--primary);
        color:white;
        border-radius:12px;
        padding:10px 18px;
        font-weight:600;
    }

    .btn-register:hover{
        background:#1d4ed8;
        color:white;
    }

    /* =========================
       SIDEBAR
    ========================= */

    .sidebar-modern{
        width:280px;
        min-height:100vh;
        background:white;
        border-right:1px solid var(--border);

        display:flex;
        flex-direction:column;
        justify-content:space-between;

        padding:25px;
    }

    .sidebar-header{
        text-align:center;
        margin-bottom:40px;
    }

    .logo-circle{
        width:70px;
        height:70px;
        margin:auto;

        border-radius:50%;
        background:var(--primary-light);

        display:flex;
        align-items:center;
        justify-content:center;
    }

    .logo-circle i{
        font-size:1.8rem;
        color:var(--primary);
    }

    .sidebar-header h3{
        margin-top:15px;
        font-weight:700;
        color:var(--text);
    }

    .sidebar-header span{
        color:var(--text-light);
        font-size:.9rem;
    }

    .sidebar-menu{
        list-style:none;
        padding:0;
    }

    .sidebar-menu li{
        margin-bottom:8px;
    }

    .sidebar-menu a{
        display:flex;
        align-items:center;
        gap:12px;

        text-decoration:none;

        padding:14px 16px;

        border-radius:14px;

        color:var(--text-light);

        transition:.3s;
    }

    .sidebar-menu a:hover{
        background:#f1f5f9;
        color:var(--primary);
    }

    .sidebar-menu a.active{
        background:var(--primary-light);
        color:var(--primary);
        font-weight:600;
    }

    .sidebar-menu i{
        font-size:1.1rem;
    }

    .sidebar-footer{
        padding-top:20px;
        border-top:1px solid var(--border);
    }

    .logout-btn{
        display:flex;
        align-items:center;
        justify-content:center;
        gap:10px;

        text-decoration:none;

        padding:12px;

        border-radius:12px;

        background:#fee2e2;
        color:#dc2626;

        font-weight:600;
    }

    .logout-btn:hover{
        background:#fecaca;
        color:#b91c1c;
    }

    /* =========================
       RESPONSIVO
    ========================= */

    @media(max-width:992px){

        .sidebar-modern{
            width:100%;
            min-height:auto;
            border-right:none;
            border-bottom:1px solid var(--border);
        }

    }

</style>

</body>
</html>
