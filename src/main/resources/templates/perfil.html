<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">

<head th:replace="fragments/head :: head('Ponto Fácil')"></head>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #dbeafe;
            --success: #16a34a;
            --danger: #dc2626;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --text-light: #64748b;
            --border: #e2e8f0;
            --shadow: 0 1px 3px rgba(0, 0, 0, .05),
                      0 10px 30px rgba(0, 0, 0, .04);
            --radius: 22px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .dashboard {
            display: flex;
            min-height: 100vh;
        }

        .content {
            flex: 1;
            padding: 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text);
        }

        .page-subtitle {
            color: var(--text-light);
            margin-top: 5px;
        }

        /* =========================
           ALERTAS
        ========================= */
        .alert {
            border: none;
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 25px;
        }

        /* =========================
           GRID ESTATÍSTICAS
        ========================= */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 25px;
            box-shadow: var(--shadow);
            transition: .3s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
        }

        .stat-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-icon {
            width: 55px;
            height: 55px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary-light);
            color: var(--primary);
            font-size: 1.4rem;
        }

        .stat-card h3 {
            font-size: 2rem;
            font-weight: 800;
            margin-top: 15px;
        }

        .stat-card p {
            color: var(--text-light);
            margin: 0;
        }

        /* =========================
           GRID PERFIL
        ========================= */
        .profile-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 25px;
        }

        .card-dashboard {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 30px;
            box-shadow: var(--shadow);
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 25px;
        }

        /* =========================
           FORMULÁRIO
        ========================= */
        .form-label {
            font-weight: 600;
            color: var(--text);
        }

        .form-control {
            min-height: 52px;
            border-radius: 14px;
            border: 1px solid var(--border);
            padding: 12px 16px;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, .15);
        }

        .form-control[readonly] {
            background: #f8fafc;
            color: #64748b;
        }

        /* =========================
           BOTÃO
        ========================= */
        .btn-save {
            width: 100%;
            height: 55px;
            border: none;
            border-radius: 14px;
            background: var(--primary);
            color: white;
            font-weight: 600;
            transition: .3s;
        }

        .btn-save:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        /* =========================
           FOTO DE PERFIL
        ========================= */
        .profile-photo {
            width: 170px;
            height: 170px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 0 0 5px var(--primary-light),
                        0 10px 25px rgba(0, 0, 0, .08);
        }

        /* =========================
           NOTIFICAÇÕES
        ========================= */
        .notification-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 14px;
            margin-bottom: 10px;
        }

        .notification-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--primary-light);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .notification-icon.success {
            background: #dcfce7;
            color: #16a34a;
        }

        /* =========================
           PROGRESS
        ========================= */
        .modern-progress {
            height: 14px;
            border-radius: 999px;
            background: #e2e8f0;
            overflow: hidden;
        }

        .modern-progress .progress-bar {
            border-radius: 999px;
            font-size: .8rem;
            font-weight: 600;
        }

        /* =========================
           RESPONSIVO
        ========================= */
        @media (max-width: 1200px) {
            .profile-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .content {
                padding: 20px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
<body>
<div class="dashboard">
    <aside th:replace="~{fragments/navbar_MenuLAteral :: sidebar('perfil')}"></aside>

    <main class="content">
        <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>
        <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

        <!-- ESTATÍSTICAS -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-top">
                    <span>Solicitações</span>
                    <div class="stat-icon">
                        <i class="bi bi-file-earmark-text-fill"></i>
                    </div>
                </div>
                <h3 th:text="${totalRegistradas}">0</h3>
                <p>Registradas</p>
            </div>

            <div class="stat-card">
                <div class="stat-top">
                    <span>Em andamento</span>
                    <div class="stat-icon">
                        <i class="bi bi-hourglass-split"></i>
                    </div>
                </div>
                <h3 th:text="${totalAndamento}">0</h3>
                <p>Aguardando resolução</p>
            </div>

            <div class="stat-card">
                <div class="stat-top">
                    <span>Concluídas</span>
                    <div class="stat-icon">
                        <i class="bi bi-check-circle-fill"></i>
                    </div>
                </div>
                <h3 th:text="${totalFinalizadas}">0</h3>
                <p>Finalizadas</p>
            </div>
        </div>

        <div class="profile-grid">
            <!-- DADOS CADASTRAIS -->
            <div class="card-dashboard">
                <h4 class="card-title">
                    <i class="bi bi-pencil-square"></i>
                    Dados Cadastrais
                </h4>
                <form th:action="@{/perfil/atualizar}" method="post">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nome</label>
                            <input type="text" class="form-control"
                                   th:value="${usuario.nome}" readonly>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Data de Nascimento</label>
                            <input type="date" class="form-control"
                                   th:value="${usuario.dataNascimento}" readonly>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">E-mail</label>
                        <input type="email" class="form-control"
                               th:value="${usuario.email}" readonly>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">CPF</label>
                            <input type="text"
                                   id="cpf"
                                   class="form-control"
                                   th:value="${usuario.cpf}"
                                   readonly>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Telefone</label>
                            <input type="text"
                                   id="telefone"
                                   name="telefone"
                                   class="form-control"
                                   th:value="${usuario.telefone}"
                                   maxlength="15">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label class="form-label">Endereço</label>
                            <input type="text" name="endereco" class="form-control"
                                   th:value="${usuario.endereco}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Número</label>
                            <input type="text" name="numero" class="form-control"
                                   th:value="${usuario.numero}">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-8 mb-4">
                            <label class="form-label">Cidade</label>
                            <input type="text" name="cidade" class="form-control"
                                   th:value="${usuario.cidade}">
                        </div>
                        <div class="col-md-4 mb-4">
                            <label class="form-label">CEP</label>
                            <input type="text"
                                   id="cep"
                                   name="cep"
                                   class="form-control"
                                   th:value="${usuario.cep}"
                                   maxlength="9">
                        </div>
                    </div>

                    <button type="submit" class="btn-save">
                        <i class="bi bi-check-circle-fill"></i>
                        Atualizar Dados
                    </button>
                </form>
            </div>

            <!-- COLUNA DIREITA -->
            <div>
                <!-- FOTO PERFIL -->
                <div class="card-dashboard text-center">
                    <img id="fotoPerfil"
                         th:src="${usuario.fotoPath != null ? '/uploads/' + usuario.fotoPath : 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}"
                         alt="Foto de Perfil"
                         class="profile-photo">

                    <h4 class="mt-4 mb-1" th:text="${usuario.nome}">Usuário</h4>
                    <p class="text-muted">Cidadão Cadastrado</p>

                    <form id="formFoto" th:action="@{/perfil/foto}" method="post" enctype="multipart/form-data">
                        <input type="file" id="inputFoto" name="foto"
                               accept="image/jpeg,image/png,image/webp,image/gif" class="d-none">
                        <button type="button" class="btn btn-primary w-100 mt-3"
                                onclick="document.getElementById('inputFoto').click()">
                            <i class="bi bi-camera-fill"></i>
                            Alterar Foto
                        </button>
                    </form>
                </div>

                <!-- NOTIFICAÇÕES -->
                <div class="card-dashboard mt-4">
                    <h4 class="card-title">
                        <i class="bi bi-bell-fill text-warning"></i>
                        Notificações
                    </h4>

                    <div th:if="${#lists.isEmpty(solicitacoes)}">
                        <p class="text-muted">Nenhuma solicitação encontrada.</p>
                    </div>

                    <div th:each="s : ${solicitacoes}" class="notification-item">
                        <div class="notification-icon">
                            <i class="bi bi-file-earmark-text"></i>
                        </div>

                        <div>
                            <strong th:text="${s.protocolo}">PF-0000</strong>
                            <br>
                            <small th:text="${s.status}">STATUS</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('inputFoto').addEventListener('change', function() {
        if (this.files && this.files.length > 0) {
            document.getElementById('formFoto').submit();
        }
    });

    function mascaraCPF(valor) {
        valor = valor.replace(/\D/g, '');
        valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
        valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
        valor = valor.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
        return valor;
    }

    function mascaraTelefone(valor) {
        valor = valor.replace(/\D/g, '');

        if (valor.length > 11) {
            valor = valor.substring(0, 11);
        }

        valor = valor.replace(/^(\d{2})(\d)/g, '($1) $2');
        valor = valor.replace(/(\d{5})(\d)/, '$1-$2');

        return valor;
    }

    function mascaraCEP(valor) {
        valor = valor.replace(/\D/g, '');

        if (valor.length > 8) {
            valor = valor.substring(0, 8);
        }

        valor = valor.replace(/^(\d{5})(\d)/, '$1-$2');

        return valor;
    }

    const cpf = document.getElementById('cpf');
    const telefone = document.getElementById('telefone');
    const cep = document.getElementById('cep');

    if (cpf) {
        cpf.value = mascaraCPF(cpf.value);
    }

    if (telefone) {
        telefone.value = mascaraTelefone(telefone.value);

        telefone.addEventListener('input', function() {
            this.value = mascaraTelefone(this.value);
        });
    }

    if (cep) {
        cep.value = mascaraCEP(cep.value);

        cep.addEventListener('input', function() {
            this.value = mascaraCEP(this.value);
        });
    }
</script>
</body>
</html>
